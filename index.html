<script>
  // 1. Función principal para cambiar de página (Ya la tenías)
  function showPage(pageId) {
    // Ocultar todas las páginas
    document.querySelectorAll('.page').forEach(page => {
      page.classList.remove('active');
    });
    // Mostrar la seleccionada
    const targetPage = document.getElementById(pageId);
    if (targetPage) {
      targetPage.classList.add('active');
      window.scrollTo(0,0);
    }
    
    // Actualizar menú activo
    document.querySelectorAll('.nav-links a').forEach(link => {
      link.classList.remove('active');
    });
    const activeLink = document.getElementById('nav-' + pageId);
    if (activeLink) activeLink.classList.add('active');
  }

  // 2. FUNCIÓN PARA EL CÓDIGO QR (Manejo de Hash)
  function handleQRNavigation() {
    const hash = window.location.hash; // Captura el #simulator
    if (hash) {
      const pageName = hash.replace('#', ''); // Quita el '#'
      showPage(pageName);
    }
  }

  // Ejecutar cuando la página termine de cargar
  window.addEventListener('load', handleQRNavigation);
  
  // Ejecutar si el usuario cambia el hash manualmente
  window.addEventListener('hashchange', handleQRNavigation);

  // Funciones auxiliares para el simulador (Toast, etc)
  function showToast(msg) { alert(msg); }
</script>
